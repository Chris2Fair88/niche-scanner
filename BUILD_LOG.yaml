# niche-scanner build log
#
# Real, chronological (oldest first) project history -- one entry per bug
# actually found and fixed, or milestone actually reached, each tied to its
# real commit hash. This is not a marketing changelog; every entry here is
# something that genuinely happened during development, with a real "why"
# behind it.
#
# Why this file exists: a side-by-side comparison of a manually-written
# video script against one generated by produce_script.py (grounded only
# in score.py/scan_trending.py metrics) found the manual script won mainly
# because it told a real story -- the validation gate failing twice, real
# bugs found and fixed -- while the generated one had only aggregate
# numbers to work with. This file gives produce_script.py the same kind of
# real, verifiable stakes to draw from.
#
# Append new entries as real events happen. Don't backfill routine or
# cosmetic changes -- only things with an actual "why" behind them.

- date: "2026-07-17"
  commit: 581c1c1
  type: milestone
  summary: >
    Initial niche-scanner pipeline committed: YouTube/Trends/Reddit
    ingestion, a composite scoring engine, and an LLM-written report,
    covering 23 candidate content niches.
  why: >
    The brief called for scoring niches for semi-passive income viability
    from primary platform signals only -- never "top niches" listicle
    content -- so the scoring engine had to be built and validated before
    trusting any of its output.

- date: "2026-07-17"
  commit: bf94ccd
  type: bug_fix
  summary: >
    The validation gate failed against real data: two niches already
    known to be dead (negative controls) ranked in the top half of all 23
    niches.
  why: >
    Root cause was two real bugs -- capture_index (a monopoly-detection
    metric) was computed but never actually factored into the composite
    score, and the breakout-video threshold was loose enough that a
    single lucky viral video counted the same as a genuinely repeated
    success. Fixed both; the gate now correctly buries dead niches at the
    bottom every run.

- date: "2026-07-17"
  commit: 95cf871
  type: bug_fix
  summary: >
    report.py silently returned an empty or truncated narrative --
    confirmed nondeterministic, since a second identical call failed a
    different way.
  why: >
    Claude Sonnet 5 runs adaptive thinking by default when the thinking
    parameter is omitted, and max_tokens caps thinking plus visible output
    combined -- so thinking alone could consume the entire budget and
    leave nothing for the actual report. Fixed by explicitly disabling
    thinking for this deterministic-synthesis task and raising max_tokens
    to give the (also larger, newer-tokenizer) output real headroom.

- date: "2026-07-17"
  commit: 910b693
  type: bug_fix
  summary: >
    Building scan_trending.py surfaced a real cross-day quota bug:
    quota_log was keyed by run_date, a data-folder label deliberately
    decoupled from real calendar time -- but Google's 100-calls/day
    search.list cap resets on real time, not on that label.
  why: >
    A script reused against an older, frozen run_date on a genuinely
    different real day would have seen stale usage from unrelated days
    counted as "today's" spend. Added a real_date column, set from the
    system clock at logging time and never from run_date, and switched
    quota enforcement to key on it instead -- verified by mocking a future
    real date under the same run_date and confirming it saw zero stale
    usage.

- date: "2026-07-17"
  commit: e6e15be
  type: bug_fix
  summary: >
    reddit-story-narration surfaced only 12 of a targeted 30 channels
    during ingestion, but its metrics (95.8% capture_index, 352 median
    velocity) were presented in the report as plain fact with no
    indication the sample was unusually thin.
  why: >
    Every one of those 12 channels was taken forward with zero filtering
    headroom, making metrics like capture_index far more sensitive to any
    single channel than in a fully-sampled niche. Added a caveat that
    triggers on any niche whose sampled channel count falls under half its
    target -- not hardcoded to this one niche -- so it catches the same
    problem automatically in the future.

- date: "2026-07-20"
  commit: 2e4d415
  type: feature
  summary: >
    Added produce_script.py: generates a shot-list-style video script for
    a niche, grounded in whatever real score.py metrics and
    scan_trending.py trending data actually exist for it.
  why: >
    The whole point was avoiding a templated, easily-flagged pattern -- a
    generic prompt with the topic swapped in. The script is required to
    cite at least one specific, real data point, enforced in the prompt
    and, when no real data exists for a niche at all, by refusing to
    generate rather than quietly producing something ungrounded.

- date: "2026-07-20"
  commit: 04ec622
  type: bug_fix
  summary: >
    produce_script.py was found to silently overwrite an existing
    generated script for the same niche+run_date -- no warning, no
    --force requirement, and the regeneration wasn't even deterministic (a
    re-run against identical grounding data produced a different script
    every time).
  why: >
    That meant a second run could destroy a committed script with zero
    trace of what was lost. Added a guard that refuses by default and
    requires an explicit --force, checked before any API call is made so a
    refusal costs nothing.
