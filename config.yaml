# niche-scanner config
# All secrets are read from environment variables named below.
# Nothing here should ever contain an actual key.

youtube:
  api_key_env: YOUTUBE_API_KEY
  quota_abort_threshold: 8000     # projected general-pool units above this requires --confirm
  search_list_daily_cap: 100      # search.list has its own separate 100-calls/day cap (1 unit/call),
                                  # independent of the general 10k-unit pool -- this is the primary,
                                  # more binding gate; quota_abort_threshold is the secondary one
  search_results_per_call: 50     # max results per search.list call
  top_channels_sampled: 30        # channels taken forward to playlistItems/videos.list
  videos_per_channel: 15          # recent uploads pulled per sampled channel
  breakout_view_threshold: 100000 # "breakout video" view count bar
  breakout_qualifying_multiplier: 2.0
                                  # a video only counts toward breakout_rate if it clears
                                  # threshold * this multiplier, not just the raw threshold.
                                  # Added after diagnosing the validation-gate failure: every
                                  # breakout channel across all 23 niches fell into one of two
                                  # clusters -- 1.2x-1.7x threshold (marginal, e.g. a content-mill
                                  # niche's lucky one-off spike) or 6x-42x (genuine, repeated
                                  # success) -- with nothing in between, so 2.0x cleanly separates
                                  # them without being a fragile hairline cut
  breakout_window_months: 12      # "new channel" window for breakout_rate
  velocity_window_days: 90        # recency window for the velocity metric

trend_scan:
  # scan_trending.py -- a lighter, more frequent check for what's breaking
  # out *right now* within a small set of niches relevant to active content
  # plans, as opposed to score.py's full 23-niche, 12-month breakout_rate.
  default_niches:
    - faceless-automation-channels
    - ai-tool-reviews
    - ai-assisted-coding
    - ai-agent-news
  videos_per_term: 25       # search.list maxResults per term (order=date only --
                            # half of a normal ingest call, since this only needs
                            # recent uploads, not a full relevance pass)
  recent_window_days: 14    # only videos published within this window count as
                            # "trending right now"
  min_age_hours: 3          # skip videos younger than this -- views/hour is noisy
                            # or meaningless in the first few hours after publish
                            # (a 20-minute-old video with 40 views isn't a 120-
                            # views/hour breakout, it's just new)
  velocity_outlier_z: 2.5   # robust (median + MAD) z-score threshold to flag
                            # "breaking out now". MAD instead of mean/stdev for the
                            # same reason velocity's cross-niche normalization moved
                            # to log1p: a single freak viral video shouldn't be able
                            # to drag the "typical" baseline for its own niche and
                            # hide itself (and everything else) as not-quite-unusual.
  min_absolute_velocity: 50 # views/hour floor -- guards against a quiet niche
                            # flagging its least-boring video as a statistical
                            # "outlier" when nothing in it is actually trending
  min_sample_for_stats: 5   # below this many recent candidate videos, median/MAD
                            # isn't meaningful; fall back to a stricter absolute-
                            # velocity-only bar instead of asserting a statistical
                            # signal the sample can't support
  max_shortlist_per_niche: 5 # cap so one freak viral video can't dominate the
                            # whole cross-niche shortlist fed to the synthesis call

trends:
  timeframe: "today 5-y"          # pytrends timeframe string
  slope_window_months: 24         # trailing window used for trend_slope
  sleep_min_seconds: 10
  sleep_max_seconds: 20
  max_retries: 6
  max_backoff_seconds: 300

reddit:
  client_id_env: REDDIT_CLIENT_ID
  client_secret_env: REDDIT_CLIENT_SECRET
  user_agent: "niche-scanner/0.1 (script app; contact via GitHub profile)"
  new_posts_sample: 100           # posts pulled from r/<sub>/new to estimate posts/day

anthropic:
  api_key_env: ANTHROPIC_API_KEY
  # NOTE: the original brief specified claude-sonnet-4-6. That model string is
  # superseded. Anthropic's current (July 2026) model lineup is Claude Fable 5,
  # Claude Opus 4.8, Claude Sonnet 5, and Claude Haiku 4.5 -- model strings
  # 'claude-fable-5', 'claude-opus-4-8', 'claude-sonnet-5', 'claude-haiku-4-5-20251001'.
  # Sonnet 5 is the right balance of cost/quality for a single synthesis call
  # over an already-small scored table, so that's the default below. Check
  # https://docs.claude.com/en/docs/about-claude/models/overview before a run
  # if it's been a while -- Anthropic ships updates frequently.
  model: claude-sonnet-5
  max_tokens: 8192

# Composite score weights. Must sum to 1.0 across these six components.
# policy_risk is NOT a weighted component -- it's a 0.5-1.0 multiplier applied
# to the weighted sum, per the brief.
weights:
  breakout_rate: 0.30
  trend_slope: 0.20
  velocity: 0.15
  sponsor_density: 0.15
  rpm_range: 0.10
  upload_burden: 0.10   # scored inversely: lower burden = better semi-passive fit

policy_risk_multiplier:
  min: 0.5
  max: 1.0

# Added after the validation gate failed on real data: capture_index (top-3
# channels' share of a niche's sampled views) was computed and stored but
# never factored into the composite, letting a niche that's essentially a
# monopoly score on breakout_rate/velocity alone. Same multiplier pattern as
# policy_risk_multiplier above rather than a 7th weighted component, so the
# six weights don't need re-deriving to sum to 1.0.
capture_index_multiplier:
  min: 0.5
  max: 1.0

# Niches that should score in the bottom third. If any land in the top half
# of the composite ranking, score.py marks the run 'suspect'.
negative_controls:
  - generic-motivation-compilations
  - luxury-lifestyle-flexing
  - clickbait-net-worth-shorts

build_log:
  # produce_script.py surfaces this many of BUILD_LOG.yaml's most recent
  # entries as candidate narrative material -- real bugs found/fixed,
  # milestones reached -- alongside score.py/scan_trending.py data. Kept
  # small and recent-biased on purpose: an old fix from months ago is
  # weaker "right now" story material than this week's, and dumping every
  # entry ever recorded just gives the model more to ignore.
  recent_entries_for_grounding: 5

content_safety:
  # Structural (code, not prompt-only) filters applied to scan_trending.py
  # candidates before they're allowed into produce_script.py's grounding
  # data. Matches are excluded entirely, not passed through with a
  # caveat. User-editable without a code change as new cases come up --
  # the Fanvue/adult-content-platform case below is the first one found,
  # not the only one that will ever exist.
  denylist_terms:
    - fanvue
    - onlyfans
    - fansly
    - "18+"
    - nsfw
  # A candidate can be a genuine statistical outlier under
  # scan_trending.py's robust_z (correctly flagged relative to its own
  # niche's baseline) while still being too small in absolute terms to be
  # worth building a video's hook/CTA around. 754 views was the concrete
  # case that triggered this floor.
  min_view_count_for_citation: 5000

elevenlabs:
  api_key_env: ELEVENLABS_API_KEY
  # If unset, produce_voiceover.py resolves the first voice actually
  # available on the account via GET /v2/voices at runtime, rather than
  # hardcoding a specific voice_id that might not exist on this account's
  # tier -- free-tier voice-library access varies by account. Set this
  # explicitly once you know which voice you want.
  voice_id: null
  # Documented default for the /v1/text-to-speech/{voice_id}/with-timestamps
  # endpoint (confirmed against ElevenLabs' own API reference).
  model_id: eleven_multilingual_v2
  # Documented default for the same endpoint; also determines the audio
  # file extension produce_voiceover.py writes (mp3_* -> .mp3).
  output_format: mp3_44100_128
